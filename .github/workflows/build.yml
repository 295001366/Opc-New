on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/gradle /var/lib/apt/lists/*
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison gawk gettext git libncurses-dev libssl-dev rsync unzip zlib1g-dev file wget gzip curl jq

      - name: Clone OpenWrt 25.12 stable & sync latest code
        run: |
          git clone -b openwrt-25.12 https://shturl.cc/Jhttps://github.com/openwrt/openwrt.git openwrt
          cd openwrt
          git pull origin openwrt-25.12
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add OpenClash package source
        run: |
          cd openwrt/package
          rm -rf luci-app-openclash
          git clone shturl.cc/6T9AFeNsTC6i459cZ9Np9nopTHGMoZQC6X5oW9j6n37diRS3PKY luci-app-openclash

      - name: Load custom config & auto download latest mihomo core
        run: |
          cd openwrt
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_hiwifi_hc5962=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_kmod-tun=y" >> .config
          echo "CONFIG_PACKAGE_ca-bundle=y" >> .config
          echo "CONFIG_PACKAGE_libopenssl=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config

          mkdir -p package/base-files/files/etc/openclash/core/
          LATEST_MIHOMO=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | jq -r .tag_name)
          wget "shturl.cc/skJVyQ4cznmvoWAPtHjliVrA8QM22ogIMb5KaI0JuVxYonfPJgYgSMoxEiSLRZb${LATEST_MIHOMO}/mihomo-linux-mipsle-softfloat-${LATEST_MIHOMO}.gz" \
          -O package/base-files/files/etc/openclash/core/clash_meta.gz         
          gunzip package/base-files/files/etc/openclash/core/clash_meta.gz
          chmod +x package/base-files/files/etc/openclash/core/clash_meta

      - name: Compile firmware
        run: |
          cd openwrt
          make defconfig
          make -j$(nproc) || make -j1 V=s

      - name: Upload compiled firmware
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt25.12_HiWiFi_HC5962
          path: openwrt/bin/targets/ramips/mt7621/*sysupgrade.bin
